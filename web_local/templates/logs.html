{% extends 'base.html' %}

{% block content %}
<div class="logs-container">
  <h1>{{ trans.get('logs_title', '系统日志') }}</h1>
  
  <div class="logs-filters">
    <div class="row">
      <div class="col-md-4 mb-3">
        <label for="source-filter" class="form-label">{{ trans.get('logs_filter_source', '按来源筛选') }}</label>
        <select id="source-filter" class="form-select">
          <option value="all">{{ trans.get('logs_source_all', '全部') }}</option>
          <option value="core">{{ trans.get('logs_source_core', '核心') }}</option>
          <option value="telegram">{{ trans.get('logs_source_telegram', '电报') }}</option>
          <option value="web-interface">{{ trans.get('logs_source_web', '管理面板') }}</option>
        </select>
      </div>
      
      <div class="col-md-4 mb-3">
        <label for="level-filter" class="form-label">{{ trans.get('logs_filter_level', '按等级筛选') }}</label>
        <select id="level-filter" class="form-select">
          <option value="all">{{ trans.get('logs_level_all', '全部') }}</option>
          <option value="debug">{{ trans.get('logs_level_debug', '调试') }}</option>
          <option value="info">{{ trans.get('logs_level_info', '信息') }}</option>
          <option value="warning">{{ trans.get('logs_level_warning', '警告') }}</option>
          <option value="error">{{ trans.get('logs_level_error', '错误') }}</option>
          <option value="critical">{{ trans.get('logs_level_critical', '严重') }}</option>
        </select>
      </div>
      
      <div class="col-md-4 mb-3">
        <label for="time-filter" class="form-label">{{ trans.get('logs_filter_time', '按时间筛选') }}</label>
        <select id="time-filter" class="form-select">
          <option value="all">{{ trans.get('logs_time_all', '全部时间') }}</option>
          <option value="hour">{{ trans.get('logs_time_hour', '最近一小时') }}</option>
          <option value="day">{{ trans.get('logs_time_day', '最近24小时') }}</option>
          <option value="week">{{ trans.get('logs_time_week', '最近一周') }}</option>
        </select>
      </div>
    </div>
    
    <div class="d-flex justify-content-end gap-2">
      <button id="refresh-logs" class="btn btn-primary">
        <i class="bi bi-arrow-clockwise"></i> {{ trans.get('logs_refresh', '刷新') }}
      </button>
      <button id="download-logs" class="btn btn-secondary">
        <i class="bi bi-download"></i> {{ trans.get('logs_download', '下载日志') }}
      </button>
      <button id="clear-logs" class="btn btn-outline-secondary">
        <i class="bi bi-x-lg"></i> {{ trans.get('logs_clear', '清除视图') }}
      </button>
    </div>
  </div>
  
  <div class="logs-content" id="logs-content">
    <div id="logs-placeholder" class="text-center p-5">
      {{ trans.get('logs_empty', '暂无日志') }}
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const sourceFilter = document.getElementById('source-filter');
    const levelFilter = document.getElementById('level-filter');
    const timeFilter = document.getElementById('time-filter');
    const refreshButton = document.getElementById('refresh-logs');
    const downloadButton = document.getElementById('download-logs');
    const clearButton = document.getElementById('clear-logs');
    const logsContent = document.getElementById('logs-content');
    const logsPlaceholder = document.getElementById('logs-placeholder');
    
    let logsData = [];
    
    fetchLogs();
    
    sourceFilter.addEventListener('change', applyFilters);
    levelFilter.addEventListener('change', applyFilters);
    timeFilter.addEventListener('change', applyFilters);
    refreshButton.addEventListener('click', fetchLogs);
    downloadButton.addEventListener('click', downloadLogs);
    clearButton.addEventListener('click', clearLogsView);
    
    setInterval(fetchLogs, 10000);
    
    function fetchLogs() {
      fetch('/logs/data')
        .then(response => response.json())
        .then(data => {
          logsData = data.logs;
          applyFilters();
        })
        .catch(error => {
          console.error('获取日志失败：', error);
        });
    }
    
    function sourceMatches(logSource, filterValue) {
      if (filterValue === 'all') {
        return true;
      }
      if (filterValue === 'web-interface') {
        return logSource === 'web-interface' || logSource === 'web';
      }
      return logSource === filterValue;
    }

    function applyFilters() {
      const source = sourceFilter.value;
      const level = levelFilter.value;
      const time = timeFilter.value;
      
      const filteredLogs = logsData.filter(log => {
        if (!sourceMatches(log.source, source)) {
          return false;
        }
        
        if (level !== 'all' && log.level !== level) {
          return false;
        }
        
        if (time !== 'all') {
          const logTime = new Date(log.timestamp);
          const now = new Date();
          
          if (time === 'hour' && (now - logTime) > 3600000) {
            return false;
          } else if (time === 'day' && (now - logTime) > 86400000) {
            return false;
          } else if (time === 'week' && (now - logTime) > 604800000) {
            return false;
          }
        }
        
        return true;
      });
      
      renderLogs(filteredLogs);
    }
    
    function renderLogs(logs) {
      if (logs.length === 0) {
        logsPlaceholder.style.display = 'block';
        logsContent.textContent = '';
        logsContent.appendChild(logsPlaceholder);
        return;
      }
      
      logsPlaceholder.style.display = 'none';
      
      logs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      logsContent.textContent = '';

      const levelWhitelist = new Set(['debug', 'info', 'warning', 'error', 'critical']);
      const levelLabelMap = {
        debug: '调试',
        info: '信息',
        warning: '警告',
        error: '错误',
        critical: '严重'
      };
      const sourceLabelMap = {
        core: '核心',
        telegram: '电报',
        'web-interface': '管理面板',
        web: '管理面板'
      };
      const fragment = document.createDocumentFragment();

      logs.forEach(log => {
        const level = String(log.level || '').toLowerCase();
        const safeLevel = levelWhitelist.has(level) ? level : 'info';
        const timestamp = new Date(log.timestamp).toLocaleString();

        const entry = document.createElement('div');
        entry.classList.add('log-entry', `log-level-${safeLevel}`);

        const tsSpan = document.createElement('span');
        tsSpan.className = 'log-timestamp';
        tsSpan.textContent = timestamp;

        const sourceSpan = document.createElement('span');
        sourceSpan.className = 'log-source';
        sourceSpan.textContent = `[${sourceLabelMap[log.source] || log.source}]`;

        const levelSpan = document.createElement('span');
        levelSpan.className = 'log-level';
        levelSpan.textContent = `[${levelLabelMap[safeLevel] || safeLevel.toUpperCase()}]`;

        const msgSpan = document.createElement('span');
        msgSpan.className = 'log-message';
        msgSpan.textContent = String(log.message || '');

        entry.appendChild(tsSpan);
        entry.appendChild(sourceSpan);
        entry.appendChild(levelSpan);
        entry.appendChild(msgSpan);
        fragment.appendChild(entry);
      });

      logsContent.appendChild(fragment);
    }
    
    function downloadLogs() {
      const params = new URLSearchParams({
        source: sourceFilter.value,
        level: levelFilter.value,
        time: timeFilter.value
      });
      window.location.href = `/logs/download?${params.toString()}`;
    }
    
    function clearLogsView() {
      logsContent.innerHTML = '';
      logsPlaceholder.style.display = 'block';
      logsContent.appendChild(logsPlaceholder);
    }
  });
</script>
{% endblock %}
