# 社交互动描写

meeting:
  first:
    - "对方抱拳行礼，眼神坦然，看起来并无恶意，你微微颔首回礼。"
    - "初次相逢，双方都保持着修士应有的警惕，寒暄间互相打量。"
    - "此人气质不凡，举手投足间自有一番从容，来历想必不简单。"
  reunion:
    - "故人重逢，相视一笑，往日种种不必言说，尽在眉眼之间。"
    - "多年未见，对方的修为精进了不少，你由衷感到高兴。"
    - "他乡遇旧识，那种喜悦是任何珍宝都换不来的。"

relationship:
  friendly:
    - "你们并肩而行，话语随意，这种自在是只有真正相熟的人之间才有的。"
    - "他拍了拍你的肩膀，那个动作说明了一切——你们已经是可以托付后背的伙伴。"
  rival:
    - "四目相对，暗流涌动，彼此都清楚，这段关系只有一个结局。"
    - "你对他点了点头，他也回以注目——惺惺相惜，但该争的一分都不会让。"
  mentor:
    - "前辈语重心长地说了几句，字字珠玑，令你受益匪浅。"
    - "师父的话你并非全然听懂，但已将其刻入心中，日后自会明白。"
  hostile:
    - "他冷冷地扫了你一眼，那目光里没有任何掩饰的轻蔑与敌意。"
    - "话不投机，气氛骤然冷却，双方都知道这段对话已经没有继续的必要。"

dialogue:
  request:
    - "对方开门见山，说明来意，眼神中带着几分期许。"
    - "他欲言又止，最终还是开了口，语气里有着难以掩饰的为难。"
  negotiation:
    - "双方各执一词，据理力争，气氛微妙，但始终维持在礼节的边界之内。"
    - "你提出了一个折中的方案，对方沉吟片刻，似乎在权衡利弊。"
  parting:
    - "道别时，彼此都没有说太多，有些情谊不需要言语来丈量。"
    - "转身离去，你没有回头，但能感觉到背后的目光一直送到了很远。"
    - "后会有期——这四个字，有时是承诺，有时只是告别的体面。"

sect:
  report:
    - "你将此行见闻如实禀报，长老听得专注，偶尔颔首，偶尔蹙眉。"
    - "任务完成，交令之时，门派给予的认可令你感到一种踏实的满足。"
  conflict:
    - "门派内部的摩擦有时比外敌更令人头疼，你选择置身事外，静观其变。"
    - "同门间的争执传到了你耳中，你叹了口气，有些事终究无法回避。"
