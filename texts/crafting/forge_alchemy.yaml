# 炼制描写

forging:
  start:
    - "你将材料投入熔炉，火焰轰然窜起，整个锻造间温度骤升。"
    - "铁锤握在手中，心神沉静下来，这一件器物需要你全部的专注。"
    - "材料在高温下开始软化，发出幽幽的光泽，等待着被赋予新的形态。"
  process:
    - "一锤一锤，节奏沉稳，将材料中的杂质一点点敲打出去。"
    - "你引动灵力渗入器胚，感受着材料的纹理，寻找最合适的走向。"
    - "刻纹是最考验耐心的一步，稍有偏差便会前功尽弃。"
  success:
    - "器物成形，散发出淡淡的灵光，你知道这一件成了。"
    - "最后一道工序完成，你拿起成品仔细端详，满意地点了点头。"
    - "品阶超出预期，这是材料与手艺共同成就的惊喜。"
  fail:
    - "裂纹从器胚中部蔓延开来，这一件废了，所耗材料付之东流。"
    - "差一点火候，或是差一分力道，总之结果不尽人意。"

alchemy:
  herb_prep:
    - "你将药材仔细清洗，去除多余的杂质，每一步都不敢马虎。"
    - "依照丹方，将药材按顺序处理好，摆放整齐，静待入炉。"
  fire_control:
    - "文火慢炼，急不得——炼丹最忌浮躁，火候全凭心境。"
    - "你随时感知炉中变化，适时调整火候，不让任何一味药性流失。"
    - "武火骤升，将药材精华逼出，再迅速转为文火收凝，时机稍纵即逝。"
  pill_forming:
    - "丹雾在炉中凝聚，你屏住呼吸，这是最关键的一刻。"
    - "炉盖轻震，丹香透出，成了！你引灵力将丹药稳稳托出。"

enchanting:
  array:
    - "你将符文一道道刻入器物，每一笔都凝聚着对阵法的理解。"
    - "阵纹成形，灵光流转其间，你检查每一处节点，确认无误。"
  seal:
    - "封印术打出，将灵气牢牢锁入器物之中，不使其逸散分毫。"
    - "最后一道封印落下，器物微微震颤，像是在接受自己的新生。"
  quality:
    - "下品：灵光黯淡，将将可用，聊胜于无。"
    - "中品：品相端正，灵力稳定，是一件合格的器物。"
    - "上品：灵光内敛，触之有温润之感，是件难得的好东西。"
    - "极品：器物自鸣，灵光流转如活物，可遇而不可求。"
