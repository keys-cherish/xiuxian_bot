# 日常活动描写

morning:
  wake:
    - "晨光透过窗棂洒入，你从调息中缓缓醒来，神清气爽，今日又是修炼的好时机。"
    - "鸟鸣声中睁开眼，体内灵力经过一夜沉淀，愈发醇厚绵长。"
    - "推开门，朝露未散，山间灵气格外清新，深吸一口，五脏六腑皆觉舒畅。"
  exercise:
    - "你于晨曦中打了一套基础拳法，虽是入门功夫，打出来却自有一番气势。"
    - "引气入体，在清晨最旺盛的天地灵气中完成今日的第一次修炼。"

alchemist:
  start:
    - "你净手焚香，虔诚地开启丹炉，炼丹是一门需要心无旁骛的艺术。"
    - "将药材依次投入，火候的拿捏全凭多年积累的手感，容不得半点马虎。"
  success:
    - "一缕丹香溢出，你知道成了——开炉验看，圆润饱满的丹药静静躺在炉底。"
    - "丹成！品相上乘，这一炉没有辜负这些珍贵药材。"
  fail:
    - "火候偏差，药性相冲，炉中升起一股黑烟，这炉丹废了。"
    - "功亏一篑，最后一步出了差错，只能清炉重来。"

market:
  browse:
    - "你漫步于坊市之间，各家摊位上的灵材法器琳琅满目，令人目不暇接。"
    - "摊主热情地招呼，你不动声色地打量着那件法器，心中已有了判断。"
  haggle:
    - "你不动声色地压了压价，摊主苦着脸叫苦，两人来回拉锯，最终各退一步。"
    - "摊主报出的价格让你忍不住挑眉，这东西根本不值这个数。"
  purchase:
    - "成交，灵石递出，换来一件称心的收获，今日不虚此行。"
    - "你将战利品收入储物袋，感觉今天的运气不错。"

rest:
  reading:
    - "你取出一卷古籍，借着灯光细细研读，偶有心得便默默记下。"
    - "书中有一处描述令你陷入沉思，反复咀嚼，竟有新的领悟。"
  socializing:
    - "与同门师兄弟闲聊，天南海北无所不谈，难得的轻松时刻。"
    - "你们围坐在一起，交流各自的修炼心得，所获颇丰。"
  crafting:
    - "你取出材料，专注地炼制一件小物，手艺活需要静下心来才能做好。"
    - "一针一线，或一锤一凿，手工制物自有其乐趣，心境也在其中得到了沉淀。"
