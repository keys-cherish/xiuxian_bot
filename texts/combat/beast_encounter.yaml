# 战斗开场描写

encounter:
  surprise:
    - "一道寒光骤然刺来，你几乎是凭本能翻身躲开，心跳瞬间加速。"
    - "不知从何处飞来一道法术，地面爆出一个焦黑的坑，你退后两步，循声望去。"
    - "你还未来得及反应，对方已经出手，形势骤然紧张。"
  deliberate:
    - "双方目光交锋，杀意无声蔓延，空气中弥漫着战前特有的压抑。"
    - "你缓缓握住法宝，对方也运起灵力，这一战已不可避免。"
    - "四目相对，无需言语，彼此都知道接下来会发生什么。"
  ambush:
    - "四面八方同时涌出身影，你被重重包围，退路已断。"
    - "埋伏！你来不及多想，本能地引动全身灵力应对。"

posture:
  aggressive:
    - "你主动出击，先手制人，攻势如暴风骤雨般倾泻而下。"
    - "你决定不给对方喘息之机，步步紧逼，招招致命。"
  defensive:
    - "你沉下心神，以守为攻，静待对方露出破绽。"
    - "你收敛气势，凝神戒备，让对方先动手。"
  probing:
    - "你出了一招试探，观察对方的反应，心中默默评估实力差距。"
    - "虚晃一枪，看清对方路数再说。"

weather_effect:
  storm:
    - "电闪雷鸣中，灵力扰动加剧，双方的感知都受到了干扰。"
  fog:
    - "浓雾弥漫，视野不足三丈，这场战斗将考验彼此的神识。"
  night:
    - "月光稀薄，黑暗成了最好的掩护，也成了最大的威胁。"
