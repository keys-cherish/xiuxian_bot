# 战斗结果描写

victory:
  clean:
    - "尘埃落定，你收功而立，对方已无力再战。"
    - "最后一击落下，胜负已分，你平复着翻涌的气血。"
    - "你缓缓收剑，战意消散，只剩满地狼藉证明这场战斗曾经存在。"
  hard_won:
    - "你险胜，身上多处受伤，但终究是你站到了最后。"
    - "赢了，但这一战打得极为艰难，你喘着粗气，四肢发沉。"
    - "勉强取胜，代价不小——不过活下来就好。"
  overwhelming:
    - "对方几乎没有还手之力，这场胜利来得轻描淡写。"
    - "三招之内，对方便已败下阵来，你甚至没有用上全力。"

defeat:
  narrow:
    - "你已竭尽全力，奈何实力有差，终究落败。"
    - "最后一丝灵力耗尽，你膝盖触地，这一战输了。"
    - "你挣扎着想要反击，但身体已经到了极限，动弹不得。"
  escape:
    - "形势危急，再战下去只有死路一条，你忍辱施展遁法，转瞬消失。"
    - "留得青山在，不怕没柴烧——你强压心中的不甘，夺路而逃。"
  saved:
    - "千钧一发之际，一道身影横在你面前，解了这场危局。"
    - "正当你以为一切都结束时，援军赶到了。"

draw:
  exhaustion:
    - "双方灵力俱已耗尽，谁也奈何不了谁，默契地停手。"
    - "打了这么久，两败俱伤，继续下去没有任何意义。"
  interruption:
    - "一声巨响从远处传来，双方不约而同地停手，各自戒备。"
    - "变故突生，这场战斗被迫中断，两人相视一眼，各自散去。"

loot:
  rich:
    - "对手身上有不少好东西，此战收获颇丰。"
    - "翻看战利品，你不由露出满意的神色。"
  poor:
    - "对方身无长物，这一战除了历练，所获寥寥。"
  special:
    - "一件来历不明的器物落入手中，你眉头微皱，此物颇为蹊跷。"
