# 天劫渡劫描写

approach:
  gathering:
    - "天色骤变，乌云如墨，从四面八方涌聚而来，遮天蔽日。"
    - "天地灵气在顷刻间陷入紊乱，周围的生灵感受到了不祥的气息，纷纷远遁。"
    - "雷云翻涌，其中隐有金光流转，那是天道在注视着你的突破。"
  pressure:
    - "磅礴的威压从天而降，仿佛天地本身在质问你是否有资格迈上这一步。"
    - "你运转护体灵力，顶住那无形的压制，心神却出奇地平静。"
    - "天劫的气息令周围方圆数里的灵气都为之颤抖，你深吸一口气，迎了上去。"

tribulation:
  first_bolt:
    - "第一道天雷轰然劈下，威势惊天，你咬牙硬撑，灵力护体在冲击下颤抖不已。"
    - "雷光蔓延全身，那种痛楚将意志中的一切杂质焚烧殆尽，反而有一种奇异的清明。"
    - "你被震退数步，喘息未定，天空中第二道雷云已然凝聚。"
  middle:
    - "雷劫一道比一道猛烈，你的防御已出现裂缝，却没有丝毫退缩的念头。"
    - "灵力在高强度消耗下开始见底，你取出灵石强行补充，牙关咬紧，不退分毫。"
    - "周身焦黑，发丝散乱，但眼神愈发明亮——越是险境，心越发静。"
  final:
    - "最后一道雷劫蓄势已久，轰然劈下，那一刻天地间仿佛只剩下这一道金雷。"
    - "你将所有灵力汇聚一处，以身迎劫，轰然爆发，与那道天雷正面相撞！"
    - "这一击，是与天道的正面交锋，胜则飞升，败则陨落，没有中间。"

outcome:
  success:
    - "雷云消散，天光重现，一种脱胎换骨的感觉从骨髓深处升腾而起。"
    - "渡劫成功，境界稳固，你感受着体内翻天覆地的变化，久久无言。"
    - "天道认可了你，这一步，你走过来了。"
    - "焦黑的外表下，是更加强韧的肉身，更加纯粹的灵魂，一切苦难都值得。"
  fail:
    - "灵力在最后一刻枯竭，你被天雷轰飞，重伤倒地，境界跌落，元气大伤。"
    - "此劫未过，修为受损，需要漫长的时间来恢复，再图后举。"
    - "天道无情，你低下头，压下心中的不甘——不是不可渡，只是时候未到。"
  near_miss:
    - "堪堪渡过，最后那一击几乎要了你的命，你颓然坐倒，久久没有力气起身。"
    - "险渡天劫，心有余悸，但境界已然稳固，这便足够了。"
