# 因果业力描写

good_karma:
  helping:
    - "你出手相助，对方感激涕零，连声道谢，你摆了摆手，修士之间，举手之劳。"
    - "见义勇为，天道自有回报——你能感觉到冥冥之中某种善意的回应。"
    - "你将仅剩的丹药分了一粒给伤重的陌生人，对方接过，眼中含泪。"
  mercy:
    - "你手下留情，放了对方一条生路，对方愣了片刻，随后深深一拜，转身离去。"
    - "留一分余地，或许日后便是一份善缘，修行之路，杀孽不可结得太重。"
  charity:
    - "你将多余的灵石散给附近的贫苦百姓，换来一片真心的感谢。"
    - "功德化作一缕温热，悄然沉入丹田，你心中一动，若有所感。"

bad_karma:
  killing:
    - "冤魂的怨气在周身萦绕不散，心神隐隐不宁，此乃杀孽的代价。"
    - "你知道这一刀不该杀，但已无可挽回，只能将这份沉重压入心底。"
    - "修罗道上，每走一步，心魔便重一分，这是选择此路必须承担的。"
  betrayal:
    - "背信弃义之后，你感到一种说不清的空洞，心境蒙上了一层阴翳。"
    - "道心有损，短期内修炼效率大减，这是天道对不诚之人的惩戒。"
  greed:
    - "贪念入心，灵力流转间出现了细微的紊乱，需要静心调息才能平复。"
    - "你得到了想要的东西，却失去了某种更难得到的东西。"

karma_effect:
  positive:
    - "冥冥之中，你发觉修炼时阻力减小，功法的运转比以往顺畅了许多。"
    - "善因结善果，一个意外的机缘在你毫无准备时悄然降临。"
    - "此地的灵机似乎对你格外亲和，灵气涌入的速度快了三分。"
  negative:
    - "业障缠身，突破时屡屡受阻，那不是实力的问题，而是道心的问题。"
    - "噩梦接连数夜，皆是过往种种，心魔蠢蠢欲动，需正视方能化解。"
    - "灵力运转时隐有滞涩，像是某种无形的枷锁，这便是业报。"
  neutral:
    - "因果循环，你种下的因迟早会生出果，是善是恶，皆在自己。"
    - "天道不偏不倚，你做了什么，终会以某种形式归还给你。"
