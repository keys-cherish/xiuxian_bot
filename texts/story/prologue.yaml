# 序章剧情文案
# /xian_start 首次进入时强制播放
# 对话格式：名字：话  旁白直接写
# 注意：鸿蒙珠是主角沈无极的专属，玩家不拥有

prologue:
  title: "序章：鸿蒙初开"

  scenes:
    - id: scene_01_hongmeng
      type: narration
      text: |
        鸿蒙未分之时，天地混沌一片。

        三道本源意志在虚无中诞生——

        恒道，时间与因果之力，水滴石穿，万物循环。
        逆道，意志与破灭之力，逆天改命，涅槃重生。
        衍道，空间与造化之力，星辰演化，开辟宇宙。

        三道碰撞，炸开鸿蒙，万界由此而生。

        凡界、灵界、真界、仙界、神界……
        无数世界如同巨树的枝叶，从那一刻开始生长。

        而你的故事，从最卑微的一片叶子开始。

    - id: scene_02_canglan
      type: narration
      text: |
        苍澜洲，天元大陆东南一隅。

        这里灵气稀薄，宗门林立却多是小派，
        真正的大能从不屑于在此驻足。

        苍澜城，一座不起眼的边陲小城。
        城中修士鱼龙混杂，散修横行，
        却也因此成了无数修仙故事的起点。

        今天，是一年一度的「灵根测试」日。

    - id: scene_03_test_scene
      type: narration
      text: |
        城中广场上人头攒动。

        一位白发老者坐在高台之上，面前摆着一块闪闪发光的灵石。
        他是负责测试的散修——张老。

        数百名十六岁的少年排着长队，
        每个人的脸上都写满了期待与紧张。

        有灵根者，可加入修仙门派，从此踏上仙途。
        无灵根者，一辈子只能做个凡人。

    - id: scene_04_others_test
      type: dialogue
      lines:
        - speaker: 张老
          text: "都排好队！一个一个来，不要推搡！"
        - speaker: null
          text: 一个少年上前，将手按在灵石上。灵石亮起明亮的蓝光。
        - speaker: 张老
          text: "水属灵根，中等资质！可入落霞谷！"
        - speaker: null
          text: |
            人群中响起一片羡慕的声音。

            你注意到队伍前面有一个沉默的少年，衣衫破旧，
            怀中似乎紧紧攥着什么东西。他的眼神很平静，
            和周围的紧张格格不入。
        - speaker: 路人甲
          text: "那个是谁？看着像个叫花子。"
        - speaker: 路人乙
          text: "听说是城东破庙里的孤儿，叫沈无极。别指望了，肯定是废灵根。"

    - id: scene_04b_shenwuji_test
      type: dialogue
      lines:
        - speaker: null
          text: |
            那个叫沈无极的少年走上前去，将手按在灵石上。

            灵石……纹丝不动。
        - speaker: 张老
          text: "废灵根。下一个。"
        - speaker: null
          text: |
            人群中又是一阵哄笑。但沈无极没有任何情绪波动。
            他只是低头看了看怀中的东西，然后平静地走下了台。

            你隐约觉得……刚才灵石的反应有些不对劲。
            好像不是没有灵根，而是什么东西干扰了测试。

            但你没时间多想——轮到你了。

    - id: scene_05_player_test
      type: dialogue
      lines:
        - speaker: null
          text: |
            你深吸一口气，走上前去。

            将手按在灵石上——

            灵石微微一闪，随即暗淡下去。
            那道光极为微弱，几乎看不到。
        - speaker: 张老
          text: "……下等灵根，勉强算有。资质太低，怕是没有宗门愿意收你。"
        - speaker: null
          text: |
            不是废灵根，但也好不到哪去。

            下等灵根——在修仙界，这和废灵根几乎没有区别。
            没有宗门愿意浪费资源培养一个下等灵根的弟子。

            你低着头走下台，耳边是周围人若有若无的窃笑。

    - id: scene_06_after_test
      type: dialogue
      lines:
        - speaker: null
          text: |
            广场散去，你独自坐在城墙根下，一言不发。

            下等灵根……是不是就意味着这辈子走不远了？
        - speaker: null
          text: |
            这时，一个身影在你旁边坐了下来。
            是刚才那个被判定为废灵根的少年——沈无极。

            他手里啃着半个冷馒头，看起来比你还淡定。
        - speaker: 沈无极
          text: "你也没考上？"
        - speaker: null
          text: 你苦笑了一下：下等灵根，比废灵根好一点，但也没宗门要。
        - speaker: 沈无极
          text: "那就自己修呗。谁规定没有宗门就不能修仙了？"
        - speaker: null
          text: 他说得轻描淡写，好像修仙只是吃饭喝水一样简单。
        - speaker: 沈无极
          text: "我认识一个老头，他以前给过我一卷功法残页。你要是有兴趣，我抄一份给你。"
        - speaker: null
          text: |
            你愣了一下。
            一个素未谋面的人，就这样把功法分享给你？
        - speaker: 沈无极
          text: "别想太多。反正我已经背下来了。功法这东西，又不会因为多一个人学就变弱。"
        - speaker: null
          text: |
            他从怀里掏出一张皱巴巴的纸，递给你。
            上面歪歪扭扭地写着几行字——

            「引气入体法·抄本」

            字迹潦草，明显是匆匆抄写的，但内容简洁明了：
            呼吸吐纳，感知灵气，引导入体。

            最基础的修炼法门。
        - speaker: 沈无极
          text: "城东破庙，我住那。以后有空来找我。"
        - speaker: null
          text: |
            他站起身来，拍了拍屁股上的灰，头也不回地走了。

            你看着手中的纸，心里升起一种说不清的感觉。

            这个叫沈无极的少年……不简单。

    - id: scene_07_first_cultivation
      type: narration
      text: |
        当天夜里，你找了一处僻静的角落，
        按照纸上的口诀，盘膝而坐。

        「吸……呼……感知天地灵气……引导入体……」

        起初什么也没发生。

        你几乎要放弃了——

        然后，一丝极细微的凉意从天地间渗入你的经脉。
        微弱，若有若无，但确实存在。

        那是灵气。

        下等灵根的你，感知灵气要比别人慢十倍、弱十倍，
        但——你确实感知到了。

        这条路，走得通。

        虽然会比任何人都慢，但你可以走。

    - id: scene_08_system_unlock
      type: narration
      text: |
        从这一刻起，你的修仙之路正式开始。

        ═══════════════════════════════
        🎮 系统已解锁
        ═══════════════════════════════

        你获得了以下能力：
        • 🧘 修炼 — 引导灵气入体，积累修为
        • 🗺️ 探索 — 前往各地寻找机缘
        • ⚔️ 历练 — 与妖兽战斗，磨砺实力
        • 🗺️ 大地图 — 查看当前所在位置和可前往的区域

        前方的路漫长而未知。
        但每一个传奇，都始于微不足道的第一步。

        📜 获得功法：【引气入体法】
        🔮 当前境界：凡人
        📍 当前位置：苍澜城

        💡 下等灵根意味着你的修炼速度比常人慢，
        但通过机缘、丹药、功法升级，这个差距可以弥补。
        修仙界中，天赋从来不是唯一的决定因素。

    - id: scene_09_hint
      type: narration
      text: |
        💡 小贴士：

        • 沈无极是你在苍澜城结识的第一个朋友，
          日后他的故事将与你的命运交织。

        • 宗门不会来找你——你需要等待各大宗门的招聘会，
          满足条件后才能加入。

        • 苍澜城周边有适合新手历练的区域，
          先积累实力，等待机缘。

        ═══════════════════════════════

  post_prologue_choices:
    - label: "🧘 开始第一次修炼"
      action: "cultivate"
    - label: "🗺️ 去城里转转"
      action: "explore_canglan_city"
    - label: "📜 查看功法"
      action: "view_skills"
    - label: "💬 去找沈无极聊聊"
      action: "npc_talk_shenwuji"
