# 探索描写

travel:
  mountain:
    - \"山路崎岖，灵气越往深处越浓，脚下的每一步都像是踩在积聚了万年的宝藏上。\"
    - \"你攀上山脊，极目远眺，云海翻涌，身处其中如临仙境。\"
    - \"古木参天，枝桠交错，将天光切割成破碎的金片，洒落一地。\"
  plains:
    - \"旷野无垠，风吹草低，偶有灵兽远远地张望，随后悄然遁入草丛。\"
    - \"平原上灵气稀薄，却有一种开阔的自在，令人心胸为之一宽。\"
  ruins:
    - \"踏入废墟，尘封的气息扑面而来，地上的阵纹已残破不堪，却依稀可见当年的精妙。\"
    - \"断壁残垣间，你发现了一块刻有文字的石碑，字迹风化大半，勉强辨认出几个字。\"
    - \"废弃的殿宇寂然无声，唯有风穿过破损的窗棂，发出低沉的呜咽。\"
  cave:
    - \"洞口隐于藤蔓之后，若非偶然察觉到其中溢出的灵气，根本不会注意到这里。\"
    - \"你点亮夜明珠，幽光照出石壁上密密麻麻的古符，心头一震。\"
    - \"越往深处走，灵气越发凝实，连呼吸都变得格外清爽。\"

discovery:
  treasure:
    - \"你拨开荆棘，眼前豁然开朗——一只落满灰尘的储物袋静静躺在石台上。\"
    - \"运转神识扫过，附近竟有一处灵脉！虽然细如发丝，却是货真价实的天地造化。\"
    - \"石缝间，一株散发着淡淡荧光的草药映入眼帘，正是你寻找已久之物。\"
  danger:
    - \"脚下忽然发出一声轻响——是机关！你当机立断跃起，乱箭从脚下掠过。\"
    - \"神识感应到一股异样的波动，你猛然停步，前方的地面……似乎在动。\"
    - \"你退后一步，正好避开从头顶落下的钟乳石，冷汗涔涔。\"
  lore:
    - \"石碑上记载着一段久远的往事，字里行间透着令人心悸的沧桑。\"
    - \"你拾起一枚玉简，神识探入，碎片化的记忆影像如洪流般涌来。\"
    - \"古老的壁画绵延整个石壁，讲述着一段你从未听闻的传说。\"

rest:
  meditation:
    - \"你盘膝而坐，引天地灵气入体，感受着修为一丝一丝地沉淀积累。\"
    - \"静坐片刻，将今日所得细细消化，感悟在心中慢慢成形。\"
  camp:
    - \"你寻了一处背风的岩壁，布下简单的结界，就地歇息。\"
    - \"篝火点起，暖意驱散了山间的寒气，这一夜难得的安宁。\"
