# 随机事件描写

positive:
  windfall:
    - "脚下一软，你低头一看，踢到了一只半埋在土里的储物袋，里面传来清脆的碰撞声。"
    - "一只受伤的灵兽蜷缩在树根旁，见你无害之意，竟将嘴里叼着的灵果轻轻放到你脚边。"
    - "山壁渗出一股清冽的灵泉，你掬水饮下，五脏六腑皆觉舒畅，灵力隐隐有所增长。"
  insight:
    - "不知为何，脑海中突然浮现出一道剑意，你当即盘坐悟道，半日后豁然开朗。"
    - "看着溪水绕石而过，你忽然对功法中一处卡壳已久的关节有了新的理解。"
    - "夜观星象，某种说不清的感悟悄然涌上心头，修为竟隐隐松动了。"
  encounter_friendly:
    - "一位游历的散修见你面善，主动分享了附近的地图，还标注了几处危险区域。"
    - "老药农见你识货，将压箱底的一株灵草低价出手，说是与你有缘。"
    - "遭遇一只灵兽幼崽，它嗅了嗅你，竟摇起尾巴，似乎想跟着你走。"

neutral:
  weather_change:
    - "天色骤变，灵雨倾盆，你寻了处岩洞暂避，雨声淅沥，别有一番意境。"
    - "浓雾悄然弥漫，不过片刻，周围已是一片白茫茫，辨不清方向。"
    - "一阵狂风骤起，周围的树木剧烈摇晃，有什么东西从深处被惊动了。"
  npc_passing:
    - "一行修士结队而过，双方点头致意，各自散去，萍水相逢，仅此而已。"
    - "远处传来法术轰鸣，看来有人正在激战，你绕道而行，不去蹚这浑水。"
  mystery:
    - "地上有一道焦黑的痕迹，延伸出去约百丈，不知是何等战斗留下的遗迹。"
    - "你发现了一处无名的小型阵法，已残破失效，但其精妙的构造令你驻足研究了许久。"

negative:
  trap:
    - "你踩中了猎人留下的绊索，好在反应及时，只是虚惊一场。"
    - "古阵余威犹在，你不慎触动，被弹射出去十余丈，摔得七荤八素。"
  ambush_beast:
    - "一头灵兽突然从草丛中扑出，嘶吼声震得树叶簌簌而落。"
    - "灵兽护崽，最为凶险——你这是撞上了一头正在哺育幼崽的母兽。"
  lost:
    - "走着走着，你发现周围的景色开始重复，似乎陷入了某种迷阵。"
    - "神识伸出，却在某处被无形阻断，这片区域有问题。"
  resource_drain:
    - "此地灵气异常稀薄，灵石消耗速度远超预期，需要尽快离开。"
    - "不知何时，你的储物袋被人悄悄摸走了两块灵石，好在被你及时察觉。"
