weather:
  晴:
    - "天际万里无云，金乌高悬，灵力在日光下格外活跃。"
    - "碧空如洗，偶有灵鹤掠过，拖出一道白色的弧线。"
    - "阳光刺目，热气蒸腾，地表灵气随之翻涌如细丝。"
  雨:
    - "细雨如丝，灵气浓郁而潮湿，每一滴雨都携带微量灵力。"
    - "暴雨倾盆，雷光在云层翻涌，灵气浓度骤增，道韵流转。"
    - "雨声淅沥，青苔湿滑，幽深之处散发着淡淡荧光。"
  雪:
    - "鹅毛大雪纷纷扬扬，天地肃杀，连灵力运转都慢了几分。"
    - "积雪无声，山峰银装素裹，只有冰裂声偶尔打破寂静。"
  雾:
    - "晨雾弥漫，十步之外难以视物，灵识受到奇异压制。"
    - "浓雾锁山，仿佛整个世界只剩眼前这一方天地。"

time_of_day:
  清晨:
    - "天边刚泛起鱼肚白，露珠凝结在灵草叶尖，折射七彩微光。"
    - "卯时将至，一股清新阳气从天地间徐徐升起。"
  正午:
    - "日头正盛，阳刚之气充沛，正是阳属功法吐纳的黄金时辰。"
    - "午时三刻，天地阳气至极，邪物此刻最为虚弱。"
  黄昏:
    - "夕阳如血，染红半边天穹，阴阳交替之际鬼物最活跃。"
    - "暮色四合，倦鸟归林，天地间弥漫着苍凉与悲壮。"
  深夜:
    - "明月高悬，银辉洒落大地，月华灵力渗入天地，阴属功法此刻事半功倍。"
    - "子时三刻，万籁俱寂，浓郁阴气从大地深处渗出。"
