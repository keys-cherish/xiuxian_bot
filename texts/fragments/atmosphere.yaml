terrain:
  山林:
    - "苍松翠柏间，灵气浓郁，踏入此处便有一种说不清的舒适感。"
    - "山道蜿蜒，怪石嶙峋，每一块岩石都被岁月打磨得沉默而圆润。"
    - "林木遮天蔽日，光线被切割成细碎的金片，随风轻轻摇曳。"
  荒漠:
    - "黄沙漫天，烈日炙烤，灵气在热浪中变得黏稠滞涩。"
    - "沙海无垠，一望无际，只有偶尔出现的枯骨告诉你有人曾走过这里。"
    - "沙暴平息后，天地间弥漫着呛人的尘土，沙丘的形状全然改变。"
  废墟:
    - "断壁残垣，苔痕深深，曾经的辉煌已被岁月侵蚀殆尽。"
    - "废墟之中偶有残存的阵纹还在微弱运转，像是在坚守某种使命。"
    - "焦黑的石壁，崩塌的殿宇，一切都在沉默地诉说着往昔。"
  水泽:
    - "水气弥漫，湖面如镜，倒映着天上云彩，分不清哪里是天哪里是地。"
    - "芦苇丛生，野鸭惊起，水底深处隐隐有光华流动。"
    - "古潭幽深，水色碧绿得近乎诡异，传说潭底住着一头沉睡万年的老龟。"
  洞府:
    - "石壁上的磷火幽幽燃烧，将洞内照得忽明忽暗，仿佛有无数影子在蠕动。"
    - "洞中灵气凝而不散，已不知积聚了多少岁月，踏入其中便如置身灵池。"
    - "阴凉的石壁渗着水珠，偶有水滴落入地上的水洼，发出清脆的回响。"
mood:
  紧张:
    - "空气仿佛凝固了，连灵力的流动都变得小心翼翼。"
    - "后背一阵发凉，那是修士对危险最原始的直觉在预警。"
    - "周围的鸟鸣声突然停了。这不是好兆头。"
  悲壮:
    - "风呜咽着穿过废墟，像是亡魂在低声哭泣。"
    - "地上残存的血迹已经发黑，但灵气的波动尚未消散。"
    - "折断的法宝，无声地诉说着一场注定悲凉的结局。"
  诡异:
    - "一切看起来都很正常。但正是这份正常，让人后背生寒。"
    - "明明什么都没有，却总感觉有什么在注视你。"
    - "空气中有一股说不清的腥甜，像是某种古老生物的气息。"
  祥和:
    - "此处灵气充沛，万物生机勃勃，令人心旷神怡，不由得放缓了脚步。"
    - "蝴蝶在花丛中翩翩起舞，一切宁静，仿佛岁月在这里停驻了。"
    - "一种难以言喻的安宁笼罩着这片土地，让人忍不住深吸一口气。"
