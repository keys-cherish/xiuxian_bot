# 战斗招式描写碎片

opening_moves:
  sword:
    - "飞剑脱鞘，化作一道青光，剑鸣如龙吟！"
    - "剑意凝聚，一股肃杀之气骤然弥漫四周。"
    - "你抬手，本命飞剑破空而出，在空中留下一道银白的轨迹。"
  fist:
    - "你沉腰蓄力，拳意勃发，内力在经脉中轰鸣运转。"
    - "掌风激荡，你一步踏出，大地微微震颤。"
    - "你握紧双拳，骨骼发出一阵清脆的声响，气势骤然大涨。"
  technique:
    - "手诀连打，法诀在唇间低鸣，灵力迅速聚于掌心成球。"
    - "你运转功法，周身灵力形成肉眼可见的漩涡，衣袂飘飘。"
    - "印决一成，五色灵光在指尖流转，化作一道符篆打出。"

clash:
  equal:
    - "双方灵力激荡，撞击处迸发出耀眼的光芒，气浪将周围草木横扫一片。"
    - "两股力量相互对峙，地面的裂缝向四面八方蔓延。"
    - "旗鼓相当！双方各退三步，衣袂猎猎作响。"
  advantage:
    - "你的攻势压过一筹，对方踉跄后退，气息已显紊乱。"
    - "步步紧逼，对方的防御在你的连击下开始出现破绽。"
  disadvantage:
    - "对方的力道超出预料，你被震退数步，虎口隐隐发麻。"
    - "你吃了一记重击，内脏翻腾，口中泛起一丝腥甜。"

counterattack:
  dodge:
    - "电光火石之间，你身形一侧，堪堪避过这记致命一击。"
    - "你倒退半步，来招的掌风擦着面颊划过，带起一缕发丝。"
  block:
    - "你横剑一格，剑身颤动，震得双臂发酸，却将这一招硬生生挡下。"
    - "灵盾乍现，那一击轰在盾面，迸出点点火星，终被化解。"
  counter:
    - "趁对方收势未稳，你反手一击，正中要害！"
    - "以彼之道，还施彼身——你借力打力，将对方的攻势反弹回去！"

finishing:
  victory:
    - "对方灵力枯竭，最终颓然倒地，战斗结束。"
    - "你收剑而立，深吸一口气，将翻涌的战意缓缓压制下去。"
    - "最后一击落下，胜负已分。你没有乘胜追击，只是静静看着对方。"
  escape:
    - "对方见势不妙，身形一晃，化作一道流光遁走，转眼消失无踪。"
    - "对方施展遁法，你追之不及，只能目送其离去。"
