# NPC台词库

elders:
  greeting:
    - "你来了，老夫正好有事要说。"
    - "坐吧，老朽沏了壶好茶，正好与你叙叙。"
    - "你的修为又精进了几分，不错，不错。"
  warning:
    - "年轻人，凡事三思而后行，冲动是修士的大忌。"
    - "老夫见过太多天才因一时意气毁了前途，你可不要重蹈覆辙。"
    - "修行一道，慢即是快。根基不稳，走得越快摔得越重。"
  encourage:
    - "此事虽难，但以你的资质，定能克服。"
    - "老夫当年也是从你这一步走过来的，现在回头看，不过如此。"

merchants:
  greeting:
    - "客官，本店货真价实，童叟无欺，请随意挑选。"
    - "哟，稀客！今日可巧，刚到了一批好货。"
    - "客官眼光不凡，一看就是行家，这边请。"
  bargaining:
    - "客官这价格可让小人折本啊，再添一成，成交！"
    - "这已经是本店最低价了，再低小人真的没得赚。"
    - "罢了罢了，看在老客的份上，便宜你五分。"
  farewell:
    - "下次再来，小人随时恭候！"
    - "慢走，欢迎下次光临！"

rivalry:
  provoke:
    - "哼，就凭你这点修为，也敢在本少爷面前班门弄斧？"
    - "识相的就把那东西交出来，省得大家难看。"
    - "你以为你是谁？在这里，我说了算。"
  defeated:
    - "你……你居然……这不可能！"
    - "今日之辱，来日必报！我记住你了！"
    - "算你厉害，但事情还没完！"
  respectful:
    - "你的实力……比我预料的要强。此战我认输。"
    - "承让了。看来我还有很长的路要走。"

mysterious:
  cryptic:
    - "你与旁人不同，老朽一眼便看出来了。"
    - "那件事……你迟早会明白的，现在说了也无益。"
    - "缘分到了，自然就懂了。此刻你若强求，反而适得其反。"
  hint:
    - "往东走，过了那道山梁，或许会有你想要的答案。"
    - "那个名字……很久没人提起了。你从哪里听说的？"
    - "你手中那件东西，来历不简单。好好保管，切莫轻易示人。"

bystanders:
  gossip:
    - "你听说了吗？昨晚北边山上闪了大半夜的光，肯定是哪位高人在渡劫！"
    - "最近妖兽活动频繁，大家出门小心些为好。"
    - "坊市里新来了个炼器师，据说出手不凡，就是要价贵得吓人。"
  warning:
    - "客官，前面那条路最近不太平，劝您绕道走。"
    - "这位道友，天色不早了，赶路要紧，莫要在这附近久留。"
