# 情感/心理描写碎片

before_choice:
  cautious:
    - "你停下脚步，眉头微蹙，心中权衡着利弊。"
    - "直觉告诉你，此事不宜鲁莽，但机会稍纵即逝。"
  bold:
    - "机会就在眼前，迟疑是修士最大的敌人。"
    - "不入虎穴，焉得虎子——这句话在你脑海中一闪而过。"
  curious:
    - "一股难以抑制的好奇心驱使着你向前。"
    - "未知的事物对你向来有着致命的吸引力。"

after_success:
  calm:
    - "你深吸一口气，将心神重新归于平静。"
    - "结果比你预料的要好，但你没有得意——修行路上，这不过是开始。"
  excited:
    - "一股难以抑制的喜悦涌上心头，你努力压制着，却还是微微咧开了嘴。"
    - "此刻的你，感觉整个天地都宽阔了几分。"

after_failure:
  resolute:
    - "你闭了闭眼，将挫败感压入心底深处。失败是修行的一部分。"
    - "咬牙，站起来。你不是第一次跌倒，也不会是最后一次。"
  bitter:
    - "苦涩在心头蔓延。明明已经很努力了……"
    - "你抬头望天，不知道是在质问苍天，还是在寻找什么答案。"

realm_feeling:
  练气期:
    - "以你现在的修为，只能模糊地感应到这里的一丝特别之处。"
    - "灵识尚浅，你只能凭直觉判断——这里有些不寻常。"
  筑基期:
    - "筑基境的灵识让你能捕捉到更多细节，但仍有许多隐藏的东西超出感知范围。"
    - "你凝神感应，轮廓渐渐清晰，但核心的秘密仍包裹在迷雾中。"
  金丹期:
    - "金丹修士的感知何等敏锐，一扫之下，大半真相便已了然于胸。"
    - "以金丹境的眼力，你看穿了表象，但这让你更加敬畏其中蕴藏的深意。"
  元婴期:
    - "元婴外放，毫无遮掩，这里的一切在你面前如同展开的画卷。"
    - "以你现在的境界，此处的奥秘不再神秘——但这并不意味着它不危险。"
  化神期:
    - "化神之境，神魂遨游虚空，这里的种种在你眼中不过是层薄纱。"
    - "以你的修为看来，此地的布置匠心独运，出自某位了不起的前辈之手。"
  合体期以上:
    - "以你合体期的修为俯瞰此地，一切机关布置尽收眼底，毫无秘密可言。"
    - "此地对你而言已无威胁，但你仍保持着警惕——越是看似平静之处，往往越藏危机。"
